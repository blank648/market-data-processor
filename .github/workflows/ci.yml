name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test (Debug + ASAN)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -o Acquire::Retry=3 cmake ninja-build gcc-14 g++-14

      - name: Restore dependency cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cmake/packages
            build-debug/_deps
          key: ${{ runner.os }}-cmake-deps-gcc14-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure build-debug
        env:
          CC: gcc-14
          CXX: g++-14
        run: |
          cmake -B build-debug -S . \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -G Ninja

      - name: Build build-debug
        run: cmake --build build-debug --parallel

      - name: Run tests (build-debug)
        working-directory: build-debug
        run: ctest --output-on-failure --timeout 60

      - name: Configure build-asan
        env:
          CC: gcc-14
          CXX: g++-14
        run: |
          cmake -B build-asan -S . \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -DENABLE_SANITIZERS=ON \
            -DCMAKE_GTEST_DISCOVER_TESTS_DISCOVERY_TIMEOUT=30 \
            -G Ninja

      - name: Build build-asan
        run: cmake --build build-asan --parallel

      - name: Run tests (build-asan)
        working-directory: build-asan
        env:
          ASAN_OPTIONS: detect_leaks=0:halt_on_error=0
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: ctest --output-on-failure --timeout 120

      - name: Save dependency cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            ~/.cmake/packages
            build-debug/_deps
          key: ${{ runner.os }}-cmake-deps-gcc14-${{ hashFiles('CMakeLists.txt') }}

  build-release:
    name: Build (Release)
    needs: build-and-test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -o Acquire::Retry=3 cmake ninja-build gcc-14 g++-14

      - name: Restore release cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cmake/packages
            build-release/_deps
          key: ${{ runner.os }}-cmake-deps-release-gcc14-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure build-release
        env:
          CC: gcc-14
          CXX: g++-14
        run: |
          cmake -B build-release -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -G Ninja

      - name: Build build-release
        run: cmake --build build-release --parallel

      - name: Save release cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            ~/.cmake/packages
            build-release/_deps
          key: ${{ runner.os }}-cmake-deps-release-gcc14-${{ hashFiles('CMakeLists.txt') }}
