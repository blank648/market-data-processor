name: CI

on:
  push:
    branches: [main]
  pull_requests:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure Release
        run: cmake -B build-release -S . -DCMAKE_BUILD_TYPE=Release
      
      - name: Build Release
        run: cmake --build build-release --parallel
      
      - name: Test Release
        run: cd build-release && ctest --output-on-failure && cd ..
      
      - name: Configure Debug (ASan+UBSan)
        run: cmake -B build-debug -S . -DCMAKE_BUILD_TYPE=Debug
      
      - name: Build Debug
        run: cmake --build build-debug --parallel
      
      - name: Test Debug
        run: cd build-debug && ctest --output-on-failure && cd ..
      
      - name: Benchmark smoke test
        run: |
          ./build-release/benchmarks/mdp-benchmarks \
            --benchmark_filter="BM_RingBuffer_PushPop_Sequential" \
            --benchmark_min_time=0.1s \
            --benchmark_out=benchmarks/ci_results.json \
            --benchmark_out_format=json
      
      - name: Health check
        run: |
          ./build-release/src/tools/mdp-health --json > health_ci.json
          python3 -c "
          import json
          d = json.load(open('health_ci.json'))
          assert d['book']['books_active'] == 3
          assert d['derived']['feed_drop_rate'] < 0.02
          print('Health check passed')
          "
      
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmarks/ci_results.json
            benchmarks/baseline_results.json
          retention-days: 30
